<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<title>Frost Tasks</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/frost-icon-192.png">

<style>
body{margin:0;font-family:sans-serif;background:#0a0f1e;color:#fff}
#app{padding:20px}
button{padding:10px;border-radius:8px;border:none;background:#3b82f6;color:#fff}
input,select{padding:10px;width:100%;margin-bottom:10px}
.card{background:#111827;padding:15px;border-radius:12px;margin-bottom:10px}
</style>
</head>

<body>

<div id="app">
  <h2>Frost Tasks</h2>

  <button onclick="syncAll()">🔄 Sync</button>

  <h3>Create Task</h3>
  <input id="subject" placeholder="Task title">
  <input id="assign" placeholder="Assign to (email)">
  <button onclick="createTask()">Create</button>

  <h3>Tasks</h3>
  <div id="tasks"></div>
</div>

<script>
const STATE={tasks:[]};

// =====================
// ERP HELPERS
// =====================
function getCsrf(){
  const m=document.cookie.split(';').find(c=>c.trim().startsWith('csrf_token='));
  return m?m.split('=')[1]:'';
}

async function erpGet(url){
  const r=await fetch(url,{credentials:'include'});
  return r.json();
}

async function erpPost(url,data){
  const r=await fetch(url,{
    method:'POST',
    credentials:'include',
    headers:{
      'Content-Type':'application/json',
      'X-Frappe-CSRF-Token':getCsrf()
    },
    body:JSON.stringify(data)
  });
  return r.json();
}

// =====================
// LOGIN CHECK
// =====================
async function checkLogin(){
  const r=await fetch('/api/method/frappe.auth.get_logged_user',{credentials:'include'});
  const d=await r.json();

  if(!d.message || d.message==="Guest"){
    window.location.href='/login?redirect-to='+encodeURIComponent(window.location.pathname);
  }
}

// =====================
// SYNC
// =====================
async function syncAll(){
  try{
    const r=await erpGet('/api/resource/Task?fields=["name","subject","status"]&limit=50');
    STATE.tasks=r.data||[];
    render();
  }catch(e){
    alert("Offline or error");
  }
}

// =====================
// RENDER
// =====================
function render(){
  const el=document.getElementById('tasks');
  el.innerHTML=STATE.tasks.map(t=>`
    <div class="card">
      <b>${t.subject}</b><br>
      Status: ${t.status}<br>
      <button onclick="toggleTask('${t.name}','${t.status}')">Toggle</button>
    </div>
  `).join('');
}

// =====================
// CREATE TASK
// =====================
async function createTask(){
  const subject=document.getElementById('subject').value;
  const assign=document.getElementById('assign').value;

  if(!subject){alert("Enter title");return;}

  let body={
    subject:subject,
    status:"Open"
  };

  if(assign){
    body._assign=JSON.stringify([assign]);
  }

  await erpPost('/api/resource/Task',body);
  syncAll();
}

// =====================
// UPDATE TASK
// =====================
async function toggleTask(name,status){
  const next=status==="Completed"?"Open":"Completed";

  await erpPost('/api/method/frappe.client.set_value',{
    doctype:"Task",
    name:name,
    fieldname:"status",
    value:next
  });

  syncAll();
}

// =====================
// OFFLINE DETECTION
// =====================
window.addEventListener('offline',()=>alert("Offline"));
window.addEventListener('online',()=>alert("Back Online"));

// =====================
// PWA INSTALL
// =====================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt=e;

  const btn=document.createElement('button');
  btn.textContent="Install App";
  btn.onclick=async ()=>{
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
  };

  document.body.appendChild(btn);
});

// =====================
// SERVICE WORKER
// =====================
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
}

// =====================
// INIT
// =====================
checkLogin();
syncAll();

</script>

</body>
</html>
